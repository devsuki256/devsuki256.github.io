<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Devsuki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="https://devsuki256.github.io" class="logo">Devsuki.</a>
            <div class="nav-links">
                <a href="gallery.html">Gallery</a>
                <a href="videos.html">Videos</a>
                <a href="https://github.com/devsuki256/" target="_blank" class="btn btn-outline">GitHub</a>
            </div>
        </div>
    </nav>

    <section id="gallery" class="section" style="padding-top: 160px;">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Image Gallery</h2>
                <p class="section-subtitle">A collection of 3D designs, environments, and game assets.</p>
            </div>
            <div class="grid gallery-grid" id="imageGallery">
                <!-- Images loaded via JS -->
            </div>
        </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Devsuki. All rights reserved.</p>
        </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="close-lightbox" aria-label="Close lightbox">&times;</button>
        <div class="lightbox-content">
            <img src="" alt="Full size image" id="lightbox-img">
        </div>
    </div>

    <script src="assets/js/main.js"></script>
